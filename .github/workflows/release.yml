name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  # Build native libraries for all platforms
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x64
            lib_name: libtml.so
            c_compiler: gcc
            cpp_compiler: g++
          - os: windows-latest
            artifact: win-x64
            lib_name: tml.dll
            c_compiler: cl
            cpp_compiler: cl
          - os: macos-latest
            artifact: osx-universal
            lib_name: libtml.dylib
            c_compiler: clang
            cpp_compiler: clang++

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-dir=${{ github.workspace }}/packages/tml-cpp/build" >> "$GITHUB_OUTPUT"
          echo "build-shared-dir=${{ github.workspace }}/packages/tml-cpp/build-shared" >> "$GITHUB_OUTPUT"

      - name: Configure CMake (Static)
        run: >
          cmake
          -S ${{ github.workspace }}/packages/tml-cpp
          -B ${{ steps.strings.outputs.build-dir }}
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DBUILD_SHARED_LIBS=OFF
          ${{ matrix.os == 'macos-latest' && '-DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"' || '' }}

      - name: Configure CMake (Shared)
        run: >
          cmake
          -S ${{ github.workspace }}/packages/tml-cpp
          -B ${{ steps.strings.outputs.build-shared-dir }}
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DBUILD_SHARED_LIBS=ON
          ${{ matrix.os == 'macos-latest' && '-DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"' || '' }}

      - name: Build Native Library (Static)
        run: cmake --build ${{ steps.strings.outputs.build-dir }} --config ${{ env.BUILD_TYPE }}

      - name: Build Native Library (Shared)
        run: cmake --build ${{ steps.strings.outputs.build-shared-dir }} --config ${{ env.BUILD_TYPE }}

      - name: Create artifact directory
        shell: bash
        run: |
          mkdir -p artifacts/static
          mkdir -p artifacts/shared

      - name: Copy artifacts (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cp ${{ steps.strings.outputs.build-dir }}/*.a artifacts/static/ || true
          cp ${{ steps.strings.outputs.build-shared-dir }}/${{ matrix.lib_name }} artifacts/shared/ || true

      - name: Copy artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cp ${{ steps.strings.outputs.build-dir }}/${{ env.BUILD_TYPE }}/*.lib artifacts/static/ || true
          cp ${{ steps.strings.outputs.build-shared-dir }}/${{ env.BUILD_TYPE }}/*.dll artifacts/shared/ || true
          cp ${{ steps.strings.outputs.build-shared-dir }}/${{ env.BUILD_TYPE }}/*.lib artifacts/shared/ || true

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.artifact }}
          path: artifacts/

  # Build WASM variants
  build-wasm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '4.0.9'
          actions-cache-folder: 'emsdk-cache'

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-dir=${{ github.workspace }}/packages/tml-cpp/build-wasm" >> "$GITHUB_OUTPUT"

      - name: Configure CMake for WASM
        run: >
          emcmake cmake
          -S ${{ github.workspace }}/packages/tml-cpp
          -B ${{ steps.strings.outputs.build-dir }}
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DUSE_WASM_BUILD=ON
          -DWASM_VARIANT=standard

      - name: Build WASM Library
        run: cmake --build ${{ steps.strings.outputs.build-dir }} --config ${{ env.BUILD_TYPE }}

      - name: Create artifact directory
        run: |
          mkdir -p artifacts/wasm
          cp ${{ steps.strings.outputs.build-dir }}/browser/*.js artifacts/wasm/ || true
          cp ${{ steps.strings.outputs.build-dir }}/browser/*.wasm artifacts/wasm/ || true

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: artifacts/wasm/

  # Publish NPM package
  publish-npm:
    needs: [build-wasm]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm
          path: packages/tml-js/wasm/

      - name: Install dependencies
        run: npm ci

      - name: Build package
        working-directory: packages/tml-js
        run: npm run build

      - name: Publish to NPM
        working-directory: packages/tml-js
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Publish NuGet package
  publish-nuget:
    needs: [build-native]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: native-linux-x64/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: native-win-x64
          path: native-win-x64/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: native-osx-universal
          path: native-osx-universal/

      - name: Prepare runtime assets
        run: |
          mkdir -p packages/tml-cs/src/TextMateLib.Bindings/runtimes/linux-x64/native
          mkdir -p packages/tml-cs/src/TextMateLib.Bindings/runtimes/win-x64/native
          mkdir -p packages/tml-cs/src/TextMateLib.Bindings/runtimes/osx-x64/native
          mkdir -p packages/tml-cs/src/TextMateLib.Bindings/runtimes/osx-arm64/native

          cp native-linux-x64/shared/libtml.so packages/tml-cs/src/TextMateLib.Bindings/runtimes/linux-x64/native/ || true
          cp native-win-x64/shared/tml.dll packages/tml-cs/src/TextMateLib.Bindings/runtimes/win-x64/native/ || true
          cp native-osx-universal/shared/libtml.dylib packages/tml-cs/src/TextMateLib.Bindings/runtimes/osx-x64/native/ || true
          cp native-osx-universal/shared/libtml.dylib packages/tml-cs/src/TextMateLib.Bindings/runtimes/osx-arm64/native/ || true

      - name: Build NuGet package
        run: dotnet pack packages/tml-cs/src/TextMateLib.Bindings/TextMateLib.Bindings.csproj --configuration Release --output ./nupkg

      - name: Publish to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  # Publish to Conan Center (creates PR to conan-center-index)
  publish-conan:
    needs: [build-native]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Conan
        run: |
          pip install conan
          conan profile detect

      - name: Test Conan package locally
        working-directory: packages/tml-cpp
        run: |
          conan create . --build=missing

      - name: Prepare Conan Center submission
        run: |
          echo "Conan package built and tested successfully."
          echo "To submit to Conan Center:"
          echo "1. Fork https://github.com/conan-io/conan-center-index"
          echo "2. Add recipe to recipes/textmatelib/"
          echo "3. Create PR to conan-center-index"
          echo ""
          echo "Package version: $(grep 'version =' packages/tml-cpp/conanfile.py | head -1)"
