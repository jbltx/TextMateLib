name: Build and Test

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            lib_name: tml.dll
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
            lib_name: libtml.so
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
            lib_name: libtml.so
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
          echo "onig-source-dir=${{ github.workspace }}/thirdparty/oniguruma" >> "$GITHUB_OUTPUT"
          echo "onig-build-dir=${{ github.workspace }}/thirdparty/oniguruma/build" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Configure CMake
        run: >
          cmake
          -S ${{ github.workspace }}
          -B ${{ steps.strings.outputs.build-dir }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DBUILD_SHARED_LIBS=ON

      - name: Build Native Library
        run: cmake --build ${{ steps.strings.outputs.build-dir }} --config ${{ matrix.build_type }}

      - name: Test Native Library
        working-directory: ${{ steps.strings.outputs.build-dir }}
        run: ctest --build-config ${{ matrix.build_type }} -V

      - name: Install native library
        run: cmake --install ${{ steps.strings.outputs.build-dir }} --config ${{ matrix.build_type }} --prefix ${{ steps.strings.outputs.build-dir }}/install

      - name: Build C# Bindings
        run: dotnet build src/csharp/TextMateLib.Bindings/TextMateLib.Bindings.csproj --configuration Release

      - name: Build C# Tests
        run: dotnet build tests/csharp/TextMateLib.Tests/TextMateLib.Tests.csproj --configuration Release

      - name: Run C# Tests
        env:
          LD_LIBRARY_PATH: ${{ steps.strings.outputs.build-dir }}/install/lib:${{ env.LD_LIBRARY_PATH }}
          PATH: ${{ steps.strings.outputs.build-dir }}/install/bin:${{ env.PATH }}
        run: dotnet test tests/csharp/TextMateLib.Tests/TextMateLib.Tests.csproj --configuration Release --verbosity normal
