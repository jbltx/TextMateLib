name: Test NPM Package

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'packages/textmatelib/**'
      - '.github/workflows/test-npm-package.yml'
  pull_request:
    branches:
      - develop
      - main
    paths:
      - 'packages/textmatelib/**'
      - '.github/workflows/test-npm-package.yml'

jobs:
  test-npm-package:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ['20.x', '24.x']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-on-failure: 'continue'

      - name: Build WASM binaries
        run: |
          mkdir -p packages/textmatelib/wasm
          bash scripts/build-wasm-standard.sh
          # Copy built WASM files to package directory
          cp build/wasm-standard/browser/tml-standard.* packages/textmatelib/wasm/

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build --workspace=packages/textmatelib

      - name: Run tests
        run: npm run test:run --workspace=packages/textmatelib

      - name: Lint code
        run: npm run lint --workspace=packages/textmatelib
        continue-on-error: true
