name: Create Release

on:
  push:
    branches:
      - main
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  create-release:
    # Only run if this is a version packages merge
    if: contains(github.event.head_commit.message, 'Version Packages')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '"version"' packages/tml-js/package.json | head -1 | sed 's/.*"\([0-9.]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ steps.version.outputs.version }}$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        if: steps.check_tag.outputs.exists == 'false'
        id: notes
        run: |
          # Extract changes from recent commits or generate from package.json
          echo "Release v${{ steps.version.outputs.version }}" > /tmp/release-notes.md
          echo "" >> /tmp/release-notes.md
          echo "## Changes" >> /tmp/release-notes.md
          echo "" >> /tmp/release-notes.md
          git log --oneline -10 --format="- %s" >> /tmp/release-notes.md

      - name: Create draft release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release-notes.md \
            --draft
